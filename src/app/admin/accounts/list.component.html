<h1>Accounts</h1>
<p>All accounts from secure (admin only) api endpoint:</p>

<a routerLink="add" class="btn btn-sm btn-success mb-2">Create Account</a>

<table class="table table-striped">
    <thead>
        <tr>
            <th style="width: 30%">Name</th>
            <th style="width: 40%">Email</th>
            <th style="width: 20%">Role</th>
            <th style="width: 10%"></th>
        </tr>
    </thead>
    <tbody>
        <tr *ngFor="let account of accounts">
            <td class="align-middle">{{ account.title }} {{ account.firstName }} {{ account.lastName }}</td>
            <td class="align-middle">{{ account.email }}</td>
            <td class="align-middle">{{ account.role }}</td>
            <td style="white-space: nowrap">
                <a routerLink="edit/{{ account.id }}" class="btn btn-sm btn-primary me-1">Edit</a>
                <button (click)="deleteAccount(account.id)" class="btn btn-sm btn-danger" [disabled]="account.isDeleting">
                    <span *ngIf="account.isDeleting" class="spinner-border spinner-border-sm me-1"></span>
                    <span *ngIf="!account.isDeleting">Delete</span>
                    <span *ngIf="account.isDeleting">Deleting...</span>
                </button>
            </td>
        </tr>
        <tr *ngIf="loading && accounts.length === 0">
            <td colspan="4" class="text-center">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <div class="mt-2">Loading accounts...</div>
            </td>
        </tr>
        <tr *ngIf="!loading && accounts.length === 0">
            <td colspan="4" class="text-center">
                No accounts found.
            </td>
        </tr>
    </tbody>
</table>
