<div class="login-container">
  <div class="login-box">
    <h1>Login</h1>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" [class.invalid]="submitted && f['email'].errors" />
        <div class="error" *ngIf="submitted && f['email'].errors?.['required']">Email is required</div>
        <div class="error" *ngIf="submitted && f['email'].errors?.['email']">Enter a valid email</div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" [class.invalid]="submitted && f['password'].errors" />
        <div class="error" *ngIf="submitted && f['password'].errors?.['required']">Password is required</div>
      </div>

      <div class="error alert" *ngIf="error">{{ error }}</div>

      <div class="button-group">
        <button type="submit" [disabled]="loading" class="btn-primary">
          {{ loading ? 'Signing in...' : 'Login' }}
        </button>
        <a routerLink="/account/register" class="btn-link">Register</a>
      </div>

      <div class="forgot-password">
        <a routerLink="/account/forgot-password">Forgot Password?</a>
      </div>
    </form>
  </div>

  <footer class="auth-footer">
    <p>IPT Angular 21 Boilerplate - Email Sign Up with Verification, Authentication & Forgot Password</p>
    <p class="author">Wilson Gayo</p>
  </footer>
</div>
