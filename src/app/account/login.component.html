<h3 class="card-header">Login</h3>
<div class="card-body">
       <div *ngIf="success" class="alert alert-success alert-dismissible fade show" role="alert">
        {{success}}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    
    <div *ngIf="error" class="alert alert-danger alert-dismissible fade show" role="alert">
        {{error}}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    
    <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="form">
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" formControlName="email" class="form-control" [ngClass]="{'is-invalid': submitted && f['email']?.invalid}" />
            <div *ngIf="submitted && f['email']?.invalid">
                <div *ngIf="f['email']?.hasError('required')" class="invalid-feedback">Email is required</div>
                <div *ngIf="f['email']?.hasError('email')" class="invalid-feedback">Email is invalid</div>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" formControlName="password" class="form-control" [ngClass]="{'is-invalid': submitted && f['password']?.invalid}" />
            <div *ngIf="submitted && f['password']?.invalid">
                <div *ngIf="f['password']?.hasError('required')" class="invalid-feedback">Password is required</div>
            </div>
        </div>

        <div class="row">
            <div class="mb-3 col">
                <button [disabled]="loading" class="btn btn-primary" type="submit">
                    <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
                    Login
                </button>
                <a routerLink="../register" class="btn btn-link">Register</a>
            </div>
            <div class="mb-3 col text-end">
                <a routerLink="../forgot-password" class="btn btn-link pe-0">Forgot Password</a>
            </div>
        </div>
    </form>
</div>
