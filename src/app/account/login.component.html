<div class="auth-container">
  <div class="auth-box">
    <h1 class="login-title">Login</h1>

    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label>Email</label>
        <input type="email" formControlName="email" [class.invalid]="submitted && f['email'].errors" placeholder="" />
        <div class="error" *ngIf="submitted && f['email'].errors?.['required']">Email is required</div>
        <div class="error" *ngIf="submitted && f['email'].errors?.['email']">Enter a valid email</div>
      </div>

      <div class="form-group">
        <label>Password</label>
        <input type="password" formControlName="password" [class.invalid]="submitted && f['password'].errors" placeholder="" />
        <div class="error" *ngIf="submitted && f['password'].errors?.['required']">Password is required</div>
      </div>

      <div class="error alert" *ngIf="error">{{ error }}</div>

      <button type="submit" [disabled]="loading" class="btn-primary">
        {{ loading ? 'Signing in...' : 'Login' }}
      </button>
    </form>

    <div class="form-footer">
      <a routerLink="/account/register" class="register-link">Register</a>
      <a routerLink="/account/forgot-password" class="forgot-link">Forgot Password?</a>
    </div>
  </div>

  <footer class="auth-footer">
    <p>IPT Angular 21 Boilerplate - Email Sign Up with Verification, Authentication & Forgot Password</p>
    <p class="author">Alyssa Marie Delgado</p>
  </footer>
</div>
