<h3 class="card-header">Login</h3>
<div class="card-body">
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" formControlName="email" class="form-control" [ngClass]="{'is-invalid': submitted && f.email.errors}" />
            <div *ngIf="submitted && f.email.errors">
                <div *ngIf="f.email.errors.required" class="invalid-feedback">Email is required</div>
                <div *ngIf="f.email.errors.email" class="invalid-feedback">Email is invalid</div>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" formControlName="password" class="form-control" [ngClass]="{'is-invalid': submitted && f.password.errors}" />
            <div *ngIf="submitted && f.password.errors">
                <div *ngIf="f.password.errors.required" class="invalid-feedback">Password is required</div>
            </div>
        </div>

        <div class="row">
            <div class="mb-3 col">
                <button [disabled]="loading" class="btn btn-primary" type="submit">
                    <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
                    Login
                </button>
                <a routerLink="../register" class="btn btn-link">Register</a>
            </div>
            <div class="mb-3 col text-end">
                <a routerLink="../forgot-password" class="btn btn-link pe-0">Forgot Password</a>
            </div>
        </div>
    </form>
</div>
