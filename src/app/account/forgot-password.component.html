<div class="auth-header">
  <h2>Forgot Password</h2>
  <p>Enter your email to receive a reset link</p>
</div>

<div class="success" *ngIf="success">{{ success }}</div>

<form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!success">
  <div class="form-group">
    <label>Email</label>
    <input type="email" formControlName="email" [class.invalid]="submitted && f['email'].errors" placeholder="you@example.com" />
    <div class="error" *ngIf="submitted && f['email'].errors?.['required']">Email is required</div>
    <div class="error" *ngIf="submitted && f['email'].errors?.['email']">Enter a valid email</div>
  </div>
  <div class="error alert" *ngIf="error">{{ error }}</div>
  <button type="submit" [disabled]="loading" class="btn-primary">
    {{ loading ? 'Sending...' : 'Send Reset Link' }}
  </button>
</form>

<div class="auth-footer">
  <a routerLink="/account/login">← Back to Login</a>
</div>
