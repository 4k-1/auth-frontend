<div class="auth-header">
  <h2>Reset Password</h2>
  <p>Enter your new password below</p>
</div>

<div class="success" *ngIf="success">
  {{ success }} <a routerLink="/account/login">Login now →</a>
</div>

<form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!success">
  <div class="form-group">
    <label>New Password</label>
    <input type="password" formControlName="password" [class.invalid]="submitted && f['password'].errors" placeholder="Min. 6 characters" />
    <div class="error" *ngIf="submitted && f['password'].errors?.['required']">Password is required</div>
    <div class="error" *ngIf="submitted && f['password'].errors?.['minlength']">Minimum 6 characters</div>
  </div>
  <div class="form-group">
    <label>Confirm Password</label>
    <input type="password" formControlName="confirmPassword" [class.invalid]="submitted && f['confirmPassword'].errors" placeholder="••••••••" />
    <div class="error" *ngIf="submitted && f['confirmPassword'].errors?.['mustMatch']">Passwords do not match</div>
  </div>
  <div class="error alert" *ngIf="error">{{ error }}</div>
  <button type="submit" [disabled]="loading" class="btn-primary">
    {{ loading ? 'Resetting...' : 'Reset Password' }}
  </button>
</form>
