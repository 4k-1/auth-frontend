<h3 class="card-header">Register</h3>
<div class="card-body">
    <form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="form">
        <div class="mb-3">
            <label class="form-label">First Name</label>
            <input type="text" formControlName="firstName" class="form-control" [ngClass]="{'is-invalid': submitted && f['firstName']?.invalid}" />
            <div *ngIf="submitted && f['firstName']?.invalid">
                <div *ngIf="f['firstName']?.hasError('required')" class="invalid-feedback">First Name is required</div>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Last Name</label>
            <input type="text" formControlName="lastName" class="form-control" [ngClass]="{'is-invalid': submitted && f['lastName']?.invalid}" />
            <div *ngIf="submitted && f['lastName']?.invalid">
                <div *ngIf="f['lastName']?.hasError('required')" class="invalid-feedback">Last Name is required</div>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Email</label>
            <input type="email" formControlName="email" class="form-control" [ngClass]="{'is-invalid': submitted && f['email']?.invalid}" />
            <div *ngIf="submitted && f['email']?.invalid">
                <div *ngIf="f['email']?.hasError('required')" class="invalid-feedback">Email is required</div>
                <div *ngIf="f['email']?.hasError('email')" class="invalid-feedback">Email is invalid</div>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" formControlName="password" class="form-control" [ngClass]="{'is-invalid': submitted && f['password']?.invalid}" />
            <div *ngIf="submitted && f['password']?.invalid">
                <div *ngIf="f['password']?.hasError('required')" class="invalid-feedback">Password is required</div>
                <div *ngIf="f['password']?.hasError('minlength')" class="invalid-feedback">Password must be at least 6 characters</div>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" formControlName="confirmPassword" class="form-control" [ngClass]="{'is-invalid': submitted && f['confirmPassword']?.invalid}" />
            <div *ngIf="submitted && f['confirmPassword']?.invalid">
                <div *ngIf="f['confirmPassword']?.hasError('required')" class="invalid-feedback">Confirm Password is required</div>
                <div *ngIf="f['confirmPassword']?.hasError('mustMatch')" class="invalid-feedback">Passwords must match</div>
            </div>
        </div>

        <div class="row">
            <div class="mb-3 col">
                <button [disabled]="loading" class="btn btn-primary" type="submit">
                    <span *ngIf="loading" class="spinner-border spinner-border-sm me-1"></span>
                    Register
                </button>
                <a routerLink="../login" class="btn btn-link">Cancel</a>
            </div>
        </div>
    </form>
</div>
