<div class="auth-header">
  <h2>Create account</h2>
  <p>Join the platform today</p>
</div>

<div class="success" *ngIf="success">
  {{ success }}
  <br><a routerLink="/account/login">Go to Login →</a>
</div>

<form [formGroup]="form" (ngSubmit)="onSubmit()" *ngIf="!success">
  <div class="form-row">
    <div class="form-group">
      <label>First Name</label>
      <input type="text" formControlName="firstName" [class.invalid]="submitted && f['firstName'].errors" placeholder="John" />
      <div class="error" *ngIf="submitted && f['firstName'].errors?.['required']">Required</div>
    </div>
    <div class="form-group">
      <label>Last Name</label>
      <input type="text" formControlName="lastName" [class.invalid]="submitted && f['lastName'].errors" placeholder="Doe" />
      <div class="error" *ngIf="submitted && f['lastName'].errors?.['required']">Required</div>
    </div>
  </div>

  <div class="form-group">
    <label>Email</label>
    <input type="email" formControlName="email" [class.invalid]="submitted && f['email'].errors" placeholder="you@example.com" />
    <div class="error" *ngIf="submitted && f['email'].errors?.['required']">Email is required</div>
    <div class="error" *ngIf="submitted && f['email'].errors?.['email']">Enter a valid email</div>
  </div>

  <div class="form-group">
    <label>Password</label>
    <input type="password" formControlName="password" [class.invalid]="submitted && f['password'].errors" placeholder="Min. 6 characters" />
    <div class="error" *ngIf="submitted && f['password'].errors?.['required']">Password is required</div>
    <div class="error" *ngIf="submitted && f['password'].errors?.['minlength']">Minimum 6 characters</div>
  </div>

  <div class="form-group">
    <label>Confirm Password</label>
    <input type="password" formControlName="confirmPassword" [class.invalid]="submitted && f['confirmPassword'].errors" placeholder="••••••••" />
    <div class="error" *ngIf="submitted && f['confirmPassword'].errors?.['required']">Please confirm your password</div>
    <div class="error" *ngIf="submitted && f['confirmPassword'].errors?.['mustMatch']">Passwords do not match</div>
  </div>

  <div class="form-group checkbox-group">
    <label class="checkbox-label">
      <input type="checkbox" formControlName="acceptTerms" />
      <span>I accept the <a href="#" class="terms-link">terms and conditions</a></span>
    </label>
    <div class="error" *ngIf="submitted && f['acceptTerms'].errors?.['required']">You must accept the terms</div>
  </div>

  <div class="error alert" *ngIf="error">{{ error }}</div>

  <button type="submit" [disabled]="loading" class="btn-primary">
    {{ loading ? 'Creating account...' : 'Create Account' }}
  </button>
</form>

<div class="auth-footer" *ngIf="!success">
  Already have an account? <a routerLink="/account/login">Sign in</a>
</div>
